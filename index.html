<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lichess Koç Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e2a;--border:#252a38;
  --accent:#c8a84b;--accent2:#e8c86e;--text:#e8e4d8;--text-muted:#7a7a8a;
  --win:#4caf7d;--loss:#e05a5a;--draw:#7a8aaa;--puzzle:#9b7fe8;
  --glow:rgba(200,168,75,.15);--gold:#f5c842;--silver:#b0bec5;--bronze:#cd7f32;--fire:#ff7043;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,168,75,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 24px 80px}

/* GRUP SEKMELERI */
.group-bar{display:flex;align-items:stretch;gap:0;border-bottom:1px solid var(--border);padding-top:24px;overflow-x:auto;scrollbar-width:none}
.group-bar::-webkit-scrollbar{display:none}
.group-tab{display:flex;align-items:center;gap:6px;padding:9px 16px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text-muted);background:transparent;white-space:nowrap;transition:all .15s;position:relative;top:1px}
.group-tab:hover{color:var(--text);border-color:var(--border);background:var(--surface)}
.group-tab.active{color:var(--accent2);border-color:var(--border);background:var(--surface);border-bottom-color:var(--surface)}
.tab-count{font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1px 6px;color:var(--text-muted)}
.group-tab.active .tab-count{background:rgba(200,168,75,.12);border-color:rgba(200,168,75,.25);color:var(--accent)}
.new-group-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border:1px dashed var(--border);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text-muted);background:transparent;white-space:nowrap;transition:all .15s;position:relative;top:1px}
.new-group-btn:hover{color:var(--accent);border-color:var(--accent)}

/* HEADER */
header{padding:18px 24px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:var(--surface);margin-left:-24px;margin-right:-24px}
.logo-area{display:flex;align-items:center;gap:12px}
.chess-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px var(--glow)}
h1{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;color:var(--accent2);letter-spacing:-.5px;line-height:1.1}
h1 span{display:block;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:400;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.header-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.group-name-display{font-size:13px;font-weight:600;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;transition:border-color .2s}
.group-name-display:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 11px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;display:flex;align-items:center;gap:5px;transition:all .2s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.spinning svg{animation:spin 1s linear infinite}
.icon-btn.danger:hover{border-color:var(--loss);color:var(--loss)}
.icon-btn.ok{border-color:rgba(76,175,125,.4);color:var(--win)}
@keyframes spin{to{transform:rotate(360deg)}}
.last-update{font-size:10px;color:var(--text-muted)}

/* ADD ROW */
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px}
.add-row label{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.add-row input{flex:1;min-width:160px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.add-row input:focus{border-color:var(--accent)}
.add-row input::placeholder{color:var(--text-muted)}
.add-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#0d0f14;padding:8px 15px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px;transition:opacity .2s,transform .1s;white-space:nowrap}
.add-btn:hover{opacity:.9}.add-btn:active{transform:scale(.97)}
.err{width:100%;color:var(--loss);font-size:11px;padding-top:2px}

/* KRİTER */
.criteria-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.criteria-toggle{width:100%;background:none;border:none;color:var(--text-muted);padding:11px 16px;text-align:left;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;transition:color .2s}
.criteria-toggle:hover{color:var(--accent)}
.criteria-body{padding:0 16px 14px;display:none}
.criteria-body.open{display:block}
.criteria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:7px;margin-top:4px}
.crit-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 11px;display:flex;align-items:center;gap:8px}
.crit-desc{flex:1}
.crit-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:1px}
.crit-rule{font-size:9px;color:var(--text-muted)}
.crit-input{width:48px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:5px;font-family:inherit;font-size:12px;text-align:center;outline:none}
.crit-input:focus{border-color:var(--accent)}
.pip-legend{display:flex;gap:9px;align-items:center;font-size:9px;color:var(--text-muted);margin-top:9px;padding-top:9px;border-top:1px solid var(--border);flex-wrap:wrap}
.pip-li{display:flex;align-items:center;gap:3px}
.pip-dot{width:8px;height:8px;border-radius:2px}

/* ŞAMPİYON KARTLARI */
.champ-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.champ-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;transition:border-color .2s}
.champ-card:hover{border-color:rgba(200,168,75,.3)}
.champ-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.champ-card.cc-games::before{background:var(--win)}
.champ-card.cc-puzzle::before{background:var(--puzzle)}
.champ-card.cc-win::before{background:var(--gold)}
.champ-card.cc-streak::before{background:var(--fire)}
.champ-card.cc-score::before{background:var(--accent)}
.champ-card.cc-wscore::before{background:rgba(155,127,232,.8)}
.champ-label{font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.champ-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.champ-val{font-size:11px;color:var(--text-muted)}
.champ-val strong{color:var(--accent2)}
.champ-medal{position:absolute;top:10px;right:12px;font-size:18px;opacity:.8}

/* PUAN TABLOSU */
.score-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.score-title{font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.score-title::after{content:'';flex:1;height:1px;background:var(--border)}
.score-tabs{display:flex;gap:6px;margin-bottom:10px}
.score-tab{background:var(--bg);border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:10px;transition:all .2s}
.score-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(200,168,75,.07)}
.score-rows{display:flex;flex-direction:column;gap:3px}
.score-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;background:var(--bg);border:1px solid var(--border)}
.score-row.sr1{border-color:rgba(245,200,66,.4);background:rgba(245,200,66,.03)}
.score-row.sr2{border-color:rgba(176,190,197,.3)}
.score-row.sr3{border-color:rgba(205,127,50,.3)}
.score-rank{width:22px;text-align:center;font-size:13px;font-weight:700;font-family:'Playfair Display',serif}
.score-row.sr1 .score-rank{color:var(--gold)}.score-row.sr2 .score-rank{color:var(--silver)}.score-row.sr3 .score-rank{color:var(--bronze)}
.score-name{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.score-pts{font-size:13px;font-weight:700;color:var(--accent2);font-family:'Playfair Display',serif;min-width:50px;text-align:right}
.score-breakdown{font-size:9px;color:var(--text-muted);text-align:right}
.score-bar-wrap{width:80px}
.score-bar-bg{height:4px;background:var(--border);border-radius:10px;overflow:hidden}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;transition:width .4s}
.score-badge{display:flex;gap:3px;flex-wrap:wrap}

/* KONTROLLER */
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.ctrl-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}
.ctrl-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;transition:all .2s}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,168,75,.07)}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-div{width:1px;height:18px;background:var(--border)}

/* ROZETLER */
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:600;letter-spacing:.3px;white-space:nowrap;line-height:1.6;cursor:default}
.badge.b-active{background:rgba(76,175,125,.15);color:var(--win);border:1px solid rgba(76,175,125,.3)}
.badge.b-gold{background:rgba(245,200,66,.18);color:var(--gold);border:1px solid rgba(245,200,66,.3)}
.badge.b-streak{background:rgba(255,112,67,.15);color:var(--fire);border:1px solid rgba(255,112,67,.3)}
.badge.b-puzzle{background:rgba(155,127,232,.15);color:var(--puzzle);border:1px solid rgba(155,127,232,.3)}
.badge.b-pstreak{background:rgba(155,127,232,.12);color:var(--puzzle);border:1px solid rgba(155,127,232,.25)}
.badge.b-warn{background:rgba(224,90,90,.12);color:var(--loss);border:1px solid rgba(224,90,90,.25)}
.badge.b-info{background:rgba(200,168,75,.12);color:var(--accent);border:1px solid rgba(200,168,75,.25)}

/* KART IZGARA */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px}

/* ÖĞRENCİ KARTI */
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;position:relative;transition:border-color .2s}
.s-card:hover{border-color:rgba(200,168,75,.22)}
.s-card.t1{border-color:rgba(245,200,66,.45);box-shadow:0 0 14px rgba(245,200,66,.06)}
.s-card.t2{border-color:rgba(176,190,197,.35)}
.s-card.t3{border-color:rgba(205,127,50,.35)}
.s-card.faded{opacity:.58}
.s-card.loading-card .card-head{opacity:.5}
.card-head{padding:11px 13px 9px;border-bottom:1px solid var(--border);background:var(--surface2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px}
.s-info{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--surface),var(--border));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:'Playfair Display',serif;font-weight:700;color:var(--accent);border:1px solid var(--border);flex-shrink:0;position:relative}
.rank-crown{position:absolute;top:-6px;right:-4px;font-size:10px;line-height:1}
.s-name{font-size:13px;font-weight:600;color:var(--text);text-decoration:none}
.s-name:hover{color:var(--accent2)}
.s-sub{font-size:9px;color:var(--text-muted);margin-top:1px}
.card-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.s-dot.on{background:var(--win);box-shadow:0 0 5px var(--win)}
.rm-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:2px 4px;border-radius:3px;font-size:11px;transition:color .2s}
.rm-btn:hover{color:var(--loss)}
.day-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(200,168,75,.09);border:1px solid rgba(200,168,75,.18);color:var(--accent);border-radius:3px;padding:1px 5px;font-size:9px;margin-top:2px}
.score-tag{display:inline-flex;align-items:center;gap:2px;background:rgba(155,127,232,.1);border:1px solid rgba(155,127,232,.25);color:var(--puzzle);border-radius:3px;padding:1px 5px;font-size:9px;margin-top:2px;margin-left:4px}
.card-badges{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}
.heat-row{display:flex;gap:2px;align-items:center}
.pip{width:9px;height:9px;border-radius:2px;background:var(--border)}
.pip.pg{background:var(--win)}.pip.pp{background:var(--puzzle)}.pip.pb{background:var(--accent)}
.pip.pa-game{background:rgba(76,175,125,.35)}.pip.pa-puzz{background:rgba(155,127,232,.35)}.pip.pa-both{background:rgba(200,168,75,.35)}
.pip.today{outline:2px solid rgba(255,255,255,.28);outline-offset:1px}
.heat-lbl{font-size:9px;color:var(--text-muted);margin-left:5px}

/* RATING */
.ratings-row{display:flex;border-bottom:1px solid var(--border)}
.r-item{flex:1;padding:6px 4px;text-align:center;border-right:1px solid var(--border)}
.r-item:last-child{border-right:none}
.r-type{font-size:8px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
.r-val{font-size:13px;font-weight:600;color:var(--text)}
.r-chg{font-size:9px;margin-top:1px}
.r-chg.up{color:var(--win)}.r-chg.dn{color:var(--loss)}.r-chg.eq{color:var(--text-muted)}

/* İSTATİSTİK */
.stats{padding:10px 13px}
.s-title{font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.s-title::after{content:'';flex:1;height:1px;background:var(--border)}
.wld-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px}
.wld-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 4px;text-align:center}
.wld-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.wld-box.wb .wld-lbl{color:var(--win)}.wld-box.lb2 .wld-lbl{color:var(--loss)}.wld-box.db .wld-lbl{color:var(--draw)}
.wld-val{font-size:18px;font-family:'Playfair Display',serif;font-weight:700}
.wld-box.wb .wld-val{color:var(--win)}.wld-box.lb2 .wld-val{color:var(--loss)}.wld-box.db .wld-val{color:var(--draw)}
.wr-wrap{margin-bottom:6px}
.wr-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-bottom:2px}
.wr-bar{height:4px;background:var(--bg);border-radius:10px;overflow:hidden;display:flex}
.bw{background:var(--win);border-radius:10px 0 0 10px}.bd{background:var(--draw)}.bl{background:var(--loss);border-radius:0 10px 10px 0}
.puz-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;margin-bottom:6px}
.puz-left{display:flex;align-items:center;gap:5px}
.puz-lbl{font-size:9px;color:var(--text-muted)}
.puz-cnt{font-size:16px;font-family:'Playfair Display',serif;font-weight:700;color:var(--puzzle)}
.puz-rat{font-size:9px;color:var(--text-muted);text-align:right}
.puz-rat span{display:block;font-size:13px;font-weight:600;color:var(--puzzle)}
.train-score-row{display:flex;align-items:center;justify-content:space-between;background:rgba(155,127,232,.06);border:1px solid rgba(155,127,232,.2);border-radius:6px;padding:6px 10px;margin-bottom:6px}
.train-lbl{font-size:9px;color:var(--text-muted)}
.train-pts{font-size:18px;font-family:'Playfair Display',serif;font-weight:700;color:var(--puzzle)}
.train-breakdown{font-size:9px;color:var(--text-muted);text-align:right;line-height:1.6}
.recent{margin-top:2px}
.g-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(37,42,56,.5);font-size:10px}
.g-row:last-child{border-bottom:none}
.g-res{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.g-res.W{background:rgba(76,175,125,.2);color:var(--win)}.g-res.L{background:rgba(224,90,90,.2);color:var(--loss)}.g-res.D{background:rgba(122,138,170,.2);color:var(--draw)}
.g-opp{color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.g-spd{color:var(--text-muted);font-size:9px}.g-t{color:var(--text-muted);font-size:9px;white-space:nowrap}

/* YÜKLEME */
.skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shim 1.5s infinite;border-radius:4px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.load-ov{position:absolute;inset:0;background:rgba(13,15,20,.6);display:flex;align-items:center;justify-content:center;border-radius:11px;z-index:10}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.empty{grid-column:1/-1;text-align:center;padding:55px 20px;color:var(--text-muted)}
.empty .ei{font-size:44px;margin-bottom:14px;opacity:.22}
.empty h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);margin-bottom:4px}
.empty p{font-size:11px;line-height:1.7}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;min-width:300px;max-width:400px;width:90%}
.modal h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--accent2);margin-bottom:14px}
.modal label{font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:7px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s;margin-bottom:11px}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:3px}
.modal-cancel{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
.modal-cancel:hover{border-color:var(--loss);color:var(--loss)}
.modal-ok{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#0d0f14;padding:7px 16px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px;transition:opacity .2s}
.modal-ok:hover{opacity:.9}

/* TOAST */

<body>

    <div class="modal-btns">

      <button class="modal-ok" onclick="renameGroup()">Kaydet</button>
    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// PUAN SİSTEMİ
// Her maç kazanma: +3 puan
// Her maç oynama: +1 puan
// Her bulmaca: +0.5 puan
// Günlük maç kriteri karşılama: +5 bonus
// Günlük bulmaca kriteri karşılama: +3 bonus
// Maç serisi (gün başına): +2 bonus
// Kazanma oranı bonusu: %60+ → +5/gün, %50+ → +2/gün
// ═══════════════════════════════════════════════════

// ── VERİ MODELİ ──
let groups    = JSON.parse(localStorage.getItem('chess_groups') || 'null');
let activeGid = localStorage.getItem('chess_active_group') || null;

if (!groups || groups.length === 0) {
  const id = uid(); groups = [{id, name:'A Grubu'}]; saveGroups();
  activeGid = id; saveActiveGid();
}
if (!activeGid || !groups.find(g => g.id === activeGid)) {
  activeGid = groups[0].id; saveActiveGid();
}

function saveGroups()    { localStorage.setItem('chess_groups', JSON.stringify(groups)); }
function saveActiveGid() { localStorage.setItem('chess_active_group', activeGid); }
function uid()           { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function loadStudentList(){ return JSON.parse(localStorage.getItem('chess_students_'+activeGid)||'[]'); }
function saveStudentList(a){ localStorage.setItem('chess_students_'+activeGid, JSON.stringify(a)); }

let actLog = JSON.parse(localStorage.getItem('chess_activity') || '{}');
function saveActLog(){ localStorage.setItem('chess_activity', JSON.stringify(actLog)); }

let crit = JSON.parse(localStorage.getItem('chess_criteria') || 'null') || {
  minDailyGames:3, minWinRate:50, streakDays:3, minPuzzleDaily:5, streakPuzzleDays:3,
  ptWin:3, ptPlay:1, ptPuzzle:0.5, ptDailyBonus:5, ptPuzzleBonus:3, ptStreak:2
};
function saveCrit(){ localStorage.setItem('chess_criteria', JSON.stringify(crit)); }

// ── CANLI VERİ (yenileme başına sıfırlanır) ──
// KRITIK: liveData asla temizlenmez, sadece tekil güncellemeler yapılır
// Bu sayede henüz yüklenmemiş öğrenciler bir önceki yükleme değerlerini korur
let liveData   = {};
let curSort    = 'score';
let curFilters = new Set();
let scorePeriod= 'week';
let refreshId  = 0;

// ── BAŞLANGIÇ ──
window.onload = () => {
  buildCritPanel();
  renderGroupBar();
  renderHeader();
  // Tüm öğrencileri hemen skeleton olarak göster
  renderGrid();
  if (loadStudentList().length > 0) refreshAll();
};

// ── DATE YARDIMCILARI ──
function dateStr(offset){
  const d = new Date(); d.setDate(d.getDate()+(offset||0));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr(){ return dateStr(0); }
function weekStart(){
  // Bu haftanın Pazartesi günü
  const d = new Date(); const day = d.getDay(); const diff = (day===0?-6:1-day);
  d.setDate(d.getDate()+diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBetween(a,b){
  const [ay,am,ad]=a.split('-').map(Number); const [by,bm,bd]=b.split('-').map(Number);
  return Math.round((new Date(ay,am-1,ad)-new Date(by,bm-1,bd))/86400000);
}

// ── AKTİVİTE LOGU ──
function logActivity(username, games, puzzles){
  if(!actLog[username]) actLog[username]={};
  const key=todayStr(), prev=actLog[username][key]||{games:0,puzzles:0};
  actLog[username][key]={games:Math.max(prev.games,games), puzzles:Math.max(prev.puzzles,puzzles)};
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-14);
  for(const d of Object.keys(actLog[username])){ if(new Date(d)<cutoff) delete actLog[username][d]; }
  saveActLog();
}

function getStreak(username, type='games'){
  const log=actLog[username]||{}, thr=type==='games'?crit.minDailyGames:crit.minPuzzleDaily;
  let s=0;
  for(let i=0;i<14;i++){
    const entry=log[dateStr(-i)]; const val=entry?(type==='games'?entry.games:entry.puzzles):0;
    if(val>=thr) s++; else break;
  }
  return s;
}

function get14Days(username){
  const log=actLog[username]||{}, out=[];
  for(let i=13;i>=0;i--){ const k=dateStr(-i); out.push({date:k,...(log[k]||{games:0,puzzles:0})}); }
  return out;
}

// ── PUAN HESAPLAMA ──
function calcScore(username, period='week'){
  const log = actLog[username]||{};
  let totalPts = 0;
  const ws = weekStart();

  for(const [date, entry] of Object.entries(log)){
    // Dönem filtresi
    if(period==='week' && daysBetween(todayStr(), date) > 6) continue;
    const games   = entry.games   || 0;
    const puzzles = entry.puzzles || 0;
    // Temel puanlar — bugünün maç sonuçlarını bilmiyoruz (sadece toplam),
    // kazanma verisini liveData'dan al (bugün için)
    const d = liveData[username];
    let wins = 0;
    if(date === todayStr() && d && !d.error){
      wins = d.wins || 0;
    }
    // Maç puanı: kazanma × ptWin + (oyun-kazanma) × ptPlay
    totalPts += wins * crit.ptWin + Math.max(0, games - wins) * crit.ptPlay;
    // Bulmaca puanı
    totalPts += puzzles * crit.ptPuzzle;
    // Günlük maç bonusu
    if(games >= crit.minDailyGames) totalPts += crit.ptDailyBonus;
    // Günlük bulmaca bonusu
    if(puzzles >= crit.minPuzzleDaily) totalPts += crit.ptPuzzleBonus;
  }
  // Seri bonusu
  const streak = getStreak(username,'games');
  totalPts += streak * crit.ptStreak;
  // Kazanma oranı bonusu (bugün için)
  const d = liveData[username];
  if(d && !d.error){
    const tot=(d.wins||0)+(d.losses||0)+(d.draws||0);
    const wr = tot>0?(d.wins/tot)*100:0;
    if(wr>=60) totalPts+=5; else if(wr>=50) totalPts+=2;
  }
  return Math.round(totalPts);
}

function scoreBreakdown(username){
  const d=liveData[username]; if(!d||d.error) return '';
  const tot=(d.wins||0)+(d.losses||0)+(d.draws||0);
  const puz=d.puzzlesSolved||0;
  const streak=getStreak(username,'games');
  const parts=[];
  if(d.wins>0) parts.push(`⚔${d.wins}K×${crit.ptWin}`);
  if(tot-d.wins>0) parts.push(`+${tot-d.wins}O×${crit.ptPlay}`);
  if(puz>0) parts.push(`🧩${puz}×${crit.ptPuzzle}`);
  if(streak>0) parts.push(`🔥${streak}g×${crit.ptStreak}`);
  return parts.join(' ');
}

// ── GRUP YÖNETİMİ ──
function renderGroupBar(){
  const bar=document.getElementById('groupBar');
  bar.innerHTML = groups.map(g=>{
    const n=(JSON.parse(localStorage.getItem('chess_students_'+g.id)||'[]')).length;
    return `<button class="group-tab ${g.id===activeGid?'active':''}" onclick="switchGroup('${g.id}')">
      ${escHtml(g.name)}<span class="tab-count">${n}</span></button>`;
  }).join('') + `<button class="new-group-btn" onclick="openNewGroupModal()">＋ Yeni Grup</button>`;
}

function switchGroup(id){
  if(id===activeGid) return;
  refreshId++;
  activeGid=id; saveActiveGid();
  curFilters.clear();
  document.querySelectorAll('.ctrl-btn[data-filter]').forEach(b=>b.classList.remove('active'));
  renderGroupBar(); renderHeader();
  // liveData'yı TEMİZLEME — önceki grup verisi kalsa da yeni grup için skeleton göster
  // Ama yeni gruptaki öğrenciler için eski liveData key'leri artık listede olmayacak
  renderGrid();
  if(loadStudentList().length>0) refreshAll();
}

function openNewGroupModal(){ document.getElementById('newGroupName').value=''; document.getElementById('modalNewGroup').style.display='flex'; setTimeout(()=>document.getElementById('newGroupName').focus(),50); }
function createGroup(){
  const name=document.getElementById('newGroupName').value.trim(); if(!name) return;
  const g={id:uid(),name}; groups.push(g); saveGroups();
  closeModal('modalNewGroup'); activeGid=g.id; saveActiveGid();
  renderGroupBar(); renderHeader(); renderGrid(); showToast(`"${name}" grubu oluşturuldu ✓`);
}
function openRenameModal(){
  const g=groups.find(x=>x.id===activeGid); if(!g) return;
  document.getElementById('renameInput').value=g.name;
  document.getElementById('modalRename').style.display='flex';
  setTimeout(()=>document.getElementById('renameInput').focus(),50);
}
function renameGroup(){
  const name=document.getElementById('renameInput').value.trim(); if(!name) return;
  const g=groups.find(x=>x.id===activeGid); if(!g) return;
  g.name=name; saveGroups(); closeModal('modalRename'); renderGroupBar(); renderHeader(); showToast(`Grup "${name}" olarak yeniden adlandırıldı ✓`);
}
function confirmDeleteGroup(){
  if(groups.length<=1){ showToast('Son grubu silemezsiniz!',true); return; }
  const g=groups.find(x=>x.id===activeGid);
  if(!confirm(`"${g?.name}" grubunu ve öğrenci listesini silmek istiyor musunuz?`)) return;
  localStorage.removeItem('chess_students_'+activeGid);
  groups=groups.filter(x=>x.id!==activeGid); saveGroups();
  activeGid=groups[0].id; saveActiveGid(); renderGroupBar(); renderHeader(); renderGrid(); showToast('Grup silindi',true);
}
function closeModal(id){ document.getElementById(id).style.display='none'; }
function renderHeader(){ const g=groups.find(x=>x.id===activeGid); document.getElementById('groupNameDisplay').textContent=g?g.name:'—'; document.title=(g?g.name+' — ':'')+'Lichess Koç Paneli'; }

// ── DIŞA / İÇE AKTAR ──
function exportData(){
  const data = {
    version:2, exportedAt: new Date().toISOString(),
    groups, activeGid,
    students: {}, activity: actLog, criteria: crit
  };
  groups.forEach(g=>{
    data.students[g.id] = JSON.parse(localStorage.getItem('chess_students_'+g.id)||'[]');
  });
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`lichess-panel-${dateStr(0)}.json`; a.click();
  showToast('Veriler dışa aktarıldı ✓');
}

function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.groups||!data.students) throw new Error('Geçersiz dosya formatı');
      // Grupları yükle
      groups=data.groups; saveGroups();
      // Her grubun öğrenci listesini yükle
      for(const [gid,list] of Object.entries(data.students)){
        localStorage.setItem('chess_students_'+gid, JSON.stringify(list));
      }
      // Aktivite logunu yükle (mevcut ile birleştir)
      if(data.activity){
        for(const [user,days] of Object.entries(data.activity)){
          if(!actLog[user]) actLog[user]={};
          for(const [day,vals] of Object.entries(days)){
            const prev=actLog[user][day]||{games:0,puzzles:0};
            actLog[user][day]={games:Math.max(prev.games,vals.games||0),puzzles:Math.max(prev.puzzles,vals.puzzles||0)};
          }
        }
        saveActLog();
      }
      // Kriterleri yükle
      if(data.criteria){ crit={...crit,...data.criteria}; saveCrit(); }
      // Aktif grubu ayarla
      if(data.activeGid && groups.find(g=>g.id===data.activeGid)) activeGid=data.activeGid;
      else activeGid=groups[0].id;
      saveActiveGid();
      buildCritPanel(); renderGroupBar(); renderHeader(); renderGrid();
      if(loadStudentList().length>0) refreshAll();
      showToast('Veriler başarıyla içe aktarıldı ✓');
    }catch(err){ showToast('İçe aktarma hatası: '+err.message, true); }
  };
  reader.readAsText(file);
  event.target.value=''; // aynı dosyayı tekrar seçebilmek için sıfırla
}

// ── ÖĞRENCİ EKLE / ÇIKAR ──
async function addStudent(){
  const inp=document.getElementById('addInput'), errEl=document.getElementById('addErr');
  const user=inp.value.trim().toLowerCase(); errEl.textContent='';
  if(!user) return;
  const students=loadStudentList();
  if(students.includes(user)){ errEl.textContent='⚠ Bu kullanıcı zaten listede.'; return; }
  inp.disabled=true;
  try{
    const res=await fetchWT(`https://lichess.org/api/user/${user}`,{},8000);
    if(!res.ok){ errEl.textContent='✗ Kullanıcı bulunamadı.'; return; }
    const data=await res.json();
    students.push(user); saveStudentList(students); inp.value='';
    renderGroupBar(); renderGrid();
    loadOneStudent(user,0); // 0 = tek öğrenci ekleme, refreshId kontrolü gerekmez
    showToast(`${data.username} eklendi ✓`);
  }catch(e){ errEl.textContent=e.name==='AbortError'?'✗ Zaman aşımı.':'✗ Bağlantı hatası.'; }
  finally{ inp.disabled=false; inp.focus(); }
}

function removeStudent(username){
  const updated=loadStudentList().filter(s=>s!==username);
  saveStudentList(updated); delete liveData[username];
  renderGroupBar(); renderGrid(); showToast(`${username} çıkarıldı`,true);
}

// ── VERİ YÜKLEME ──
async function refreshAll(){
  const myId = ++refreshId;
  const students = loadStudentList();
  if(students.length===0) return;
  const btn=document.getElementById('refreshBtn'); btn.classList.add('spinning');
  setLoadStatus(`Yükleniyor… 0/${students.length}`);
  // KRITIK: liveData'yı temizlemiyoruz!
  // Öğrencilerin mevcut verisi skeleton yerine son verilerini gösterir.
  // Sadece yükleme durumunu belirt.
  renderGrid(); // Tüm öğrencileri göster (veri var olanlar kartla, olmayanlar skeleton)
  let done=0;
  for(const user of students){
    if(myId!==refreshId) break;
    await loadOneStudent(user, myId);
    done++;
    if(myId!==refreshId) break;
    setLoadStatus(`Yükleniyor… ${done}/${students.length}`);
    // Her öğrenci yüklenince sadece o kartı güncelle (tüm grid'i yeniden çizme!)
    updateOneCard(user, myId);
  }
  if(myId===refreshId){
    btn.classList.remove('spinning'); setLoadStatus('');
    document.getElementById('lastUpdate').textContent='Güncellendi: '+new Date().toLocaleTimeString('tr-TR');
    renderGrid(); // Son tam render — tüm veriler hazır
    renderChamps(); renderScoreTable();
  }
}

async function loadOneStudent(username, myId){
  try{
    const userRes=await fetchWT(`https://lichess.org/api/user/${username}`,{},10000);
    if(!userRes.ok) throw new Error('not_found');
    const user=await userRes.json();
    if(myId && myId!==refreshId) return;

    // Online durumu
    let online=false;
    if(user.online===true) online=true;
    else if(user.seenAt) online=(Date.now()-user.seenAt)<5*60*1000;

    // Bugünkü oyunlar
    const now=new Date(), since=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
    const gRes=await fetchWT(`https://lichess.org/api/games/user/${username}?since=${since}&max=100&moves=false&opening=false&clocks=false`,{headers:{Accept:'application/x-ndjson'}},15000);
    if(myId && myId!==refreshId) return;
    const gText=await gRes.text();
    const games=gText.trim().split('\n').filter(l=>l.trim()).map(l=>{try{return JSON.parse(l);}catch{return null;}}).filter(Boolean);
    let wins=0,losses=0,draws=0; const recent=[];
    for(const g of games){
      const wu=(g.players?.white?.user?.name||'').toLowerCase();
      const color=wu===username?'white':'black';
      const winner=g.winner;
      let result;
      if(!winner){ if(g.status==='aborted'||g.status==='noStart') continue; draws++; result='draw'; }
      else if(winner===color){ wins++; result='win'; }
      else{ losses++; result='loss'; }
      const opp=color==='white'?(g.players?.black?.user?.name||'Anonim'):(g.players?.white?.user?.name||'Anonim');
      const ts=g.lastMoveAt||g.createdAt;
      recent.push({result,opponent:opp,speed:g.speed||'',time:ts?fmtTime(new Date(ts)):''});
    }
    if(myId && myId!==refreshId) return;

    // Ratingler
    const ratings={}, perf=user.perfs||{};
    for(const k of ['bullet','blitz','rapid','classical']){
      if(perf[k]&&perf[k].games>0) ratings[k]={int:perf[k].rating,prog:perf[k].prog||0};
    }

    // Bulmaca
    let puzzlesSolved=0, puzzleRating=perf.puzzle?perf.puzzle.rating:null;
    try{
      const aRes=await fetchWT(`https://lichess.org/api/user/${username}/activity`,{},12000);
      if(aRes.ok){
        const aData=await aRes.json();
        if(myId && myId!==refreshId) return;
        if(Array.isArray(aData)){
          if(!actLog[username]) actLog[username]={};
          for(const entry of aData){
            let eDate=entry.interval?.start||entry.date||null;
            if(!eDate) continue;
            if(typeof eDate==='number'){ const d=new Date(eDate); eDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
            // Bulmaca: bugün veya dün
            if(eDate===todayStr()||eDate===dateStr(-1)){
              const cnt=getPuzzleCount(entry);
              if(cnt>puzzlesSolved) puzzlesSolved=cnt;
            }
            // Geçmiş 14 gün actLog'a işle
            if(daysBetween(todayStr(),eDate)>=0&&daysBetween(todayStr(),eDate)<=14){
              const prev=actLog[username][eDate]||{games:0,puzzles:0};
              let eg=prev.games;
              if(entry.games&&typeof entry.games==='object'){
                let gt=0; for(const v of Object.values(entry.games)) if(v&&typeof v==='object') gt+=(v.win||0)+(v.loss||0)+(v.draw||0);
                if(gt>eg) eg=gt;
              }
              const ep=Math.max(prev.puzzles, getPuzzleCount(entry));
              actLog[username][eDate]={games:eg,puzzles:ep};
            }
          }
          saveActLog();
        }
      }
    }catch(e){ console.warn(`[${username}] aktivite:`,e.message); }

    if(myId && myId!==refreshId) return;
    liveData[username]={displayName:user.username,title:user.title||'',online,ratings,wins,losses,draws,puzzlesSolved,puzzleRating,recentGames:recent,loadedAt:Date.now()};
    logActivity(username, wins+losses+draws, puzzlesSolved);
  }catch(err){
    console.warn(`[${username}]:`,err.message);
    if(!liveData[username]) liveData[username]={error:true,displayName:username};
  }
}

function getPuzzleCount(entry){
  if(entry.puzzles?.score){ const s=entry.puzzles.score; return(s.win||0)+(s.loss||0)+(s.draw||0); }
  if(entry.puzzles&&typeof entry.puzzles==='object'){ const p=entry.puzzles; return(p.win||0)+(p.loss||0)+(p.draw||0); }
  return 0;
}

// Tek kartı güncelle (tüm grid'i yeniden çizmeden)
function updateOneCard(username, myId){
  if(myId && myId!==refreshId) return;
  const students=loadStudentList();
  const sorted=[...students].sort((a,b)=>scoreForSort(b)-scoreForSort(a));
  const rank=sorted.indexOf(username)+1;
  const d=liveData[username]; if(!d) return;
  const grid=document.getElementById('cardsGrid');
  const existing=grid.querySelector(`[data-user="${CSS.escape(username)}"]`);
  if(existing){
    const html=buildCard(username,d,rank);
    const tmp=document.createElement('div'); tmp.innerHTML=html;
    if(tmp.firstElementChild) existing.replaceWith(tmp.firstElementChild);
  }
}

// ── ROZET MOTORU ──
function getBadges(username,d){
  if(!d||d.error) return [];
  const badges=[], total=(d.wins||0)+(d.losses||0)+(d.draws||0), winRate=total>0?Math.round((d.wins/total)*100):0;
  const puzzles=d.puzzlesSolved||0, gs=getStreak(username,'games'), ps=getStreak(username,'puzzles');
  if(total>=crit.minDailyGames) badges.push({cls:'b-active',icon:'⚡',label:'Aktif',tip:`Bugün ${total} maç ≥${crit.minDailyGames}`});
  else if(total>0) badges.push({cls:'b-info',icon:'▷',label:`${total} maç`,tip:'Bugün maç yaptı'});
  else badges.push({cls:'b-warn',icon:'💤',label:'Pasif',tip:'Bugün maç yok'});
  if(total>=3&&winRate>=crit.minWinRate) badges.push({cls:'b-gold',icon:'🏆',label:`%${winRate}`,tip:`≥%${crit.minWinRate} kazanma`});
  if(gs>=crit.streakDays) badges.push({cls:'b-streak',icon:'🔥',label:`${gs}g Seri`,tip:`${gs} gün üst üste maç`});
  if(puzzles>=crit.minPuzzleDaily) badges.push({cls:'b-puzzle',icon:'🧩',label:`${puzzles}`,tip:`≥${crit.minPuzzleDaily} bulmaca bugün`});
  if(ps>=crit.streakPuzzleDays) badges.push({cls:'b-pstreak',icon:'🎯',label:`${ps}g 🧩Seri`,tip:`${ps} gün bulmaca serisi`});
  return badges;
}

// ── SIRALAMA / FİLTRE ──
function scoreForSort(username){
  const d=liveData[username]; if(!d||d.error) return -9999;
  const total=(d.wins||0)+(d.losses||0)+(d.draws||0);
  const wr=total>0?(d.wins/total)*100:0;
  if(curSort==='score')   return calcScore(username,'week');
  if(curSort==='games')   return total;
  if(curSort==='winrate') return wr;
  if(curSort==='puzzles') return d.puzzlesSolved||0;
  if(curSort==='streak')  return getStreak(username,'games');
  if(curSort==='name')    return -(username.charCodeAt(0));
  return calcScore(username,'week');
}

function passes(username){
  if(curFilters.size===0) return true;
  const d=liveData[username]; if(!d) return true;
  if(d.error) return curFilters.has('inactive');
  const total=(d.wins||0)+(d.losses||0)+(d.draws||0);
  if(curFilters.has('active')   && total>=crit.minDailyGames) return true;
  if(curFilters.has('inactive') && total<crit.minDailyGames)  return true;
  if(curFilters.has('streak')   && getStreak(username,'games')>=crit.streakDays) return true;
  if(curFilters.has('puzzle')   && (d.puzzlesSolved||0)>=crit.minPuzzleDaily) return true;
  return false;
}

function setSort(k){ curSort=k; document.querySelectorAll('.ctrl-btn[data-sort]').forEach(b=>b.classList.toggle('active',b.dataset.sort===k)); renderGrid(); }
function togFilter(k){ curFilters.has(k)?curFilters.delete(k):curFilters.add(k); document.querySelectorAll('.ctrl-btn[data-filter]').forEach(b=>b.classList.toggle('active',curFilters.has(b.dataset.filter))); renderGrid(); }
function setScorePeriod(p){ scorePeriod=p; document.querySelectorAll('.score-tab').forEach(b=>b.classList.toggle('active',b.dataset.period===p)); renderScoreTable(); }

// ── RENDER ──
function renderGrid(){
  const grid=document.getElementById('cardsGrid');
  const students=loadStudentList();
  if(students.length===0){
    grid.innerHTML='<div class="empty"><div class="ei">♟</div><h3>Henüz öğrenci yok</h3><p>Yukarıdan lichess kullanıcı adı ekle.</p></div>';
    return;
  }
  // Sabit liste: öğrenci sırası değişmemeli, sadece veri güncellenince sırala
  // Veri henüz yüklenmediyse öğrenci listesi sırasını koru (skeleton göster)
  const allLoaded = students.every(u => liveData[u]);
  const sorted = allLoaded
    ? [...students].sort((a,b)=>scoreForSort(b)-scoreForSort(a))
    : [...students]; // Henüz yüklenmemişse orijinal sırayı koru
  const rankMap = Object.fromEntries(sorted.map((u,i)=>[u,i+1]));
  const filtered = sorted.filter(passes);
  if(filtered.length===0){
    grid.innerHTML='<div class="empty"><div class="ei">🔍</div><h3>Filtre eşleşmedi</h3></div>';
    return;
  }
  const frag=document.createDocumentFragment();
  for(const u of filtered){
    const d=liveData[u];
    const html=d?buildCard(u,d,rankMap[u]||0):skeletonCard(u);
    const tmp=document.createElement('div'); tmp.innerHTML=html;
    if(tmp.firstElementChild) frag.appendChild(tmp.firstElementChild);
  }
  grid.innerHTML=''; grid.appendChild(frag);
}

// ── ŞAMPİYONLAR ──
function renderChamps(){
  const students=loadStudentList().filter(u=>liveData[u]&&!liveData[u].error);
  if(students.length<2){ document.getElementById('champStrip').innerHTML=''; return; }
  const get=(fn)=>{
    const best=students.reduce((b,u)=>fn(u)>fn(b)?u:b);
    return {user:best, val:fn(best), d:liveData[best]};
  };
  const champData=[
    {cls:'cc-score',  label:'⭐ En Yüksek Puan',   medal:'🏆', ...get(u=>calcScore(u,'week')),   valLabel:u=>calcScore(u,'week')+' puan'},
    {cls:'cc-games',  label:'⚔ En Çok Maç',        medal:'🎯', ...get(u=>(liveData[u].wins||0)+(liveData[u].losses||0)+(liveData[u].draws||0)), valLabel:u=>`${(liveData[u].wins||0)+(liveData[u].losses||0)+(liveData[u].draws||0)} maç bugün`},
    {cls:'cc-puzzle', label:'🧩 En Çok Bulmaca',   medal:'🧩', ...get(u=>liveData[u].puzzlesSolved||0), valLabel:u=>`${liveData[u].puzzlesSolved||0} bulmaca`},
    {cls:'cc-win',    label:'🏆 En Yüksek Kazanma', medal:'📈', ...get(u=>{ const d=liveData[u]; const t=(d.wins||0)+(d.losses||0)+(d.draws||0); return t>=3?(d.wins/t)*100:0; }), valLabel:u=>{ const d=liveData[u]; const t=(d.wins||0)+(d.losses||0)+(d.draws||0); return t>=3?`%${Math.round((d.wins/t)*100)} kazanma`:'az maç'; }},
    {cls:'cc-streak', label:'🔥 En Uzun Seri',      medal:'🔥', ...get(u=>getStreak(u,'games')),  valLabel:u=>`${getStreak(u,'games')} günlük seri`},
    {cls:'cc-wscore', label:'📅 Haftalık Puan',     medal:'⭐', ...get(u=>calcScore(u,'week')),   valLabel:u=>calcScore(u,'week')+' puan bu hafta'},
  ];
  document.getElementById('champStrip').innerHTML=champData.map(c=>`
    <div class="champ-card ${c.cls}">
      <div class="champ-label">${c.label}</div>
      <div class="champ-name">${escHtml(c.d?.displayName||c.user)}</div>
      <div class="champ-val"><strong>${c.valLabel(c.user)}</strong></div>
      <div class="champ-medal">${c.medal}</div>
    </div>`).join('');
}

// ── PUAN TABLOSU ──
function renderScoreTable(){
  const students=loadStudentList().filter(u=>liveData[u]&&!liveData[u].error);
  if(students.length===0){ document.getElementById('scoreRows').innerHTML='<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:11px">Veri bekleniyor…</div>'; return; }
  const scored=[...students].map(u=>({u,pts:calcScore(u,scorePeriod),bd:scoreBreakdown(u)})).sort((a,b)=>b.pts-a.pts);
  const maxPts=scored[0]?.pts||1;
  document.getElementById('scoreRows').innerHTML=scored.map(({u,pts,bd},i)=>{
    const rank=i+1, d=liveData[u];
    const rCls=rank===1?'sr1':rank===2?'sr2':rank===3?'sr3':'';
    const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const pct=Math.round((pts/maxPts)*100);
    const bdgs=getBadges(u,d).slice(0,3).map(b=>`<span class="badge ${b.cls}">${b.icon} ${b.label}</span>`).join('');
    return `<div class="score-row ${rCls}">
      <div class="score-rank">${medal}</div>
      <div class="score-name">${escHtml(d.displayName||u)}</div>
      <div class="score-badge">${bdgs}</div>
      <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div></div>
      <div>
        <div class="score-pts">${pts}</div>
        <div class="score-breakdown">${bd}</div>
      </div>
    </div>`;
  }).join('');
}

// ── KART OLUŞTURUCU ──
function skeletonCard(u){
  return `<div class="s-card loading-card" data-user="${escHtml(u)}">
    <div class="card-head"><div class="s-info">
      <div class="avatar skel" style="width:32px;height:32px">&nbsp;</div>
      <div><div class="skel" style="width:80px;height:12px;margin-bottom:4px">&nbsp;</div><div class="skel" style="width:50px;height:9px">&nbsp;</div></div>
    </div></div>
    <div style="padding:14px 13px"><div class="skel" style="height:44px;border-radius:6px">&nbsp;</div></div>
    <div class="load-ov"><div class="spinner"></div></div>
  </div>`;
}

function buildCard(username, d, rank){
  const total=(d.wins||0)+(d.losses||0)+(d.draws||0);
  const winPct=total>0?Math.round((d.wins/total)*100):0;
  const drawPct=total>0?Math.round((d.draws/total)*100):0;
  const lossPct=100-winPct-drawPct;
  const badges=getBadges(username,d);
  const score=calcScore(username,'week');
  const crown=rank===1?'👑':rank===2?'🥈':rank===3?'🥉':'';
  const cardCls=rank===1?'t1':rank===2?'t2':rank===3?'t3':'';
  const rHTML=['bullet','blitz','rapid','classical'].map(k=>{
    const r=d.ratings?.[k]; if(!r) return '';
    const dif=r.prog||0, cc=dif>0?'up':dif<0?'dn':'eq', ct=dif>0?`▲${dif}`:dif<0?`▼${Math.abs(dif)}`:'—';
    return `<div class="r-item"><div class="r-type">${k==='bullet'?'BLT':k==='blitz'?'BLZ':k==='rapid'?'RPD':'CLS'}</div><div class="r-val">${r.int}</div><div class="r-chg ${cc}">${ct}</div></div>`;
  }).join('');
  const gHTML=(d.recentGames||[]).slice(0,4).map(g=>{
    const r=g.result==='win'?'W':g.result==='loss'?'L':'D';
    return `<div class="g-row"><div class="g-res ${r}">${r}</div><div class="g-opp" title="${escHtml(g.opponent||'?')}">${escHtml(g.opponent||'?')}</div><div class="g-spd">${g.speed||''}</div><div class="g-t">${g.time||''}</div></div>`;
  }).join('');
  const days14=get14Days(username);
  const pipHtml=days14.map(day=>{
    const isToday=day.date===todayStr();
    const hg=day.games>=crit.minDailyGames, hp=day.puzzles>=crit.minPuzzleDaily;
    const ag=day.games>0, ap=day.puzzles>0;
    const cls=(hg&&hp)?'pb':hg?'pg':hp?'pp':(ag&&ap)?'pa-both':ag?'pa-game':ap?'pa-puzz':'';
    return `<div class="pip ${cls}${isToday?' today':''}" title="${day.date}: ${day.games} maç, ${day.puzzles} bulmaca"></div>`;
  }).join('');
  const gs=getStreak(username,'games'), ps=getStreak(username,'puzzles');
  const heatLbl=gs>1?`🔥 ${gs}g seri`:ps>1?`🧩 ${ps}g seri`:'14 gün';
  const bdgHtml=badges.map(b=>`<span class="badge ${b.cls}" title="${b.tip}">${b.icon} ${b.label}</span>`).join('');
  const bd=scoreBreakdown(username);
  return `<div class="s-card ${cardCls} ${total===0?'faded':''}" data-user="${escHtml(username)}">
    <div class="card-head">
      <div class="card-top">
        <div class="s-info">
          <div class="avatar">${escHtml(username[0].toUpperCase())}${crown?`<span class="rank-crown">${crown}</span>`:''}</div>
          <div>
            <a href="https://lichess.org/@/${encodeURIComponent(username)}" target="_blank" class="s-name">${escHtml(d.displayName||username)}</a>
            <div class="s-sub">${d.title?`<b style="color:var(--accent)">[${escHtml(d.title)}]</b> · `:''}${d.online?'Çevrimiçi':'Çevrimdışı'}
              <div class="day-tag">🎯 ${total} maç</div>
              <div class="score-tag">⭐ ${score} puan</div>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <div class="s-dot ${d.online?'on':''}" title="${d.online?'Çevrimiçi':'Çevrimdışı'}"></div>
          <button class="rm-btn" data-rmuser="${escHtml(username)}" title="Çıkar">✕</button>
        </div>
      </div>
      <div class="card-badges">${bdgHtml}</div>
      <div class="heat-row">${pipHtml}<span class="heat-lbl">${heatLbl}</span></div>
    </div>
    ${rHTML?`<div class="ratings-row">${rHTML}</div>`:''}
    <div class="stats">
      <div class="s-title">Bugünkü Maçlar</div>
      <div class="wld-row">
        <div class="wld-box wb"><div class="wld-lbl">Kazandı</div><div class="wld-val">${d.wins||0}</div></div>
        <div class="wld-box lb2"><div class="wld-lbl">Kaybetti</div><div class="wld-val">${d.losses||0}</div></div>
        <div class="wld-box db"><div class="wld-lbl">Berabere</div><div class="wld-val">${d.draws||0}</div></div>
      </div>
      ${total>0?`<div class="wr-wrap">
        <div class="wr-labels"><span style="color:var(--win)">%${winPct} G</span><span style="color:var(--draw)">%${drawPct} B</span><span style="color:var(--loss)">%${lossPct} K</span></div>
        <div class="wr-bar"><div class="bw" style="width:${winPct}%"></div><div class="bd" style="width:${drawPct}%"></div><div class="bl" style="width:${lossPct}%"></div></div>
      </div>`:''}
      <div class="puz-row">
        <div class="puz-left"><span style="font-size:14px">🧩</span><div><div style="font-size:11px;font-weight:600;color:var(--puzzle)">Bulmacalar</div><div class="puz-lbl">bugün çözülen</div></div></div>
        <div class="puz-cnt">${d.puzzlesSolved??0}</div>
        <div class="puz-rat"><div>Puan</div><span>${d.puzzleRating??'—'}</span></div>
      </div>
      <div class="train-score-row">
        <div><div style="font-size:11px;font-weight:600;color:var(--puzzle)">⭐ Antrenman Puanı</div><div class="puz-lbl">bu hafta</div></div>
        <div class="train-pts">${score}</div>
        <div class="train-breakdown">${bd||'—'}</div>
      </div>
      ${gHTML?`<div class="s-title" style="margin-top:5px">Son Maçlar</div><div class="recent">${gHTML}</div>`:''}
    </div>
  </div>`;
}

// ── KRİTER PANELİ ──
function toggleCrit(){ const b=document.getElementById('critBody'),a=document.getElementById('critArrow'); b.classList.toggle('open'); a.textContent=b.classList.contains('open')?'▲':'▼'; }

  const defs=[
    {key:'minDailyGames',   b:{cls:'b-active',icon:'⚡',lbl:'Aktif'},       name:'Aktif Oyuncu',      rule:'Günlük min. maç sayısı'},
    {key:'minWinRate',      b:{cls:'b-gold',  icon:'🏆',lbl:'%Kazanma'},    name:'Yüksek Kazanma',    rule:'Min. kazanma oranı (%)'},
    {key:'streakDays',      b:{cls:'b-streak',icon:'🔥',lbl:'Seri'},        name:'Maç Serisi (gün)',  rule:'Üst üste kaç gün?'},
    {key:'minPuzzleDaily',  b:{cls:'b-puzzle',icon:'🧩',lbl:'Bulmaca'},     name:'Günlük Bulmaca',    rule:'Günlük min. bulmaca'},
    {key:'streakPuzzleDays',b:{cls:'b-pstreak',icon:'🎯',lbl:'Bulmaca Seri'},name:'Bulmaca Serisi',   rule:'Üst üste kaç gün?'},
    {key:'ptWin',           b:{cls:'b-gold',  icon:'⭐',lbl:'Kazanma pt'}, name:'Kazanma Puanı',     rule:'Her kazanılan maç puanı'},
    {key:'ptPlay',          b:{cls:'b-info',  icon:'⭐',lbl:'Oynama pt'},  name:'Oynama Puanı',      rule:'Her oynanan maç puanı'},
    {key:'ptPuzzle',        b:{cls:'b-puzzle',icon:'⭐',lbl:'Bulmaca pt'}, name:'Bulmaca Puanı',     rule:'Her bulmaca puanı'},
    {key:'ptDailyBonus',    b:{cls:'b-active',icon:'⭐',lbl:'Günlük bonus'},name:'Günlük Maç Bonusu', rule:'Günlük kriteri karşılama'},
    {key:'ptPuzzleBonus',   b:{cls:'b-puzzle',icon:'⭐',lbl:'Bulmaca bonus'},name:'Bulmaca Bonusu',   rule:'Bulmaca kriteri karşılama'},
    {key:'ptStreak',        b:{cls:'b-streak',icon:'⭐',lbl:'Seri bonus'},  name:'Seri Günlük Bonus', rule:'Aktif seri başına puan'},
  ];
  document.getElementById('critGrid').innerHTML=defs.map(d=>`
    <div class="crit-item">
      <span class="badge ${d.b.cls}">${d.b.icon} ${d.b.lbl}</span>
      <div class="crit-desc"><div class="crit-name">${d.name}</div><div class="crit-rule">${d.rule}</div></div>
      <input class="crit-input" type="number" min="0" max="100" step="${d.key.startsWith('pt')&&d.key==='ptPuzzle'?'0.5':'1'}" value="${crit[d.key]}" onchange="updateCrit('${d.key}',this.value)">
    </div>`).join('');
}
function updateCrit(key,val){
  crit[key]=Math.max(0,parseFloat(val)||0); saveCrit();
  renderGrid(); renderChamps(); renderScoreTable();
}

// ── YARDIMCILAR ──
function fetchWT(url,opts={},ms=10000){
  const ctrl=new AbortController(), t=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(t));
}
function fmtTime(date){
  const diff=Math.floor((Date.now()-date.getTime())/60000);
  if(diff<1) return 'az önce'; if(diff<60) return diff+'dk'; if(diff<1440) return Math.floor(diff/60)+'sa'; return Math.floor(diff/1440)+'g';
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setLoadStatus(msg){ const el=document.getElementById('loadStatus'); if(msg){el.textContent=msg;el.classList.add('show');}else{el.textContent='';el.classList.remove('show');} }
function showToast(msg,isErr=false){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(isErr?' err':''); setTimeout(()=>{t.className='toast';},3000); }

// Event delegation — rm butonu
document.addEventListener('click',e=>{ const b=e.target.closest('.rm-btn'); if(b){ const u=b.dataset.rmuser; if(u) removeStudent(u); } });

// Auto-refresh 5 dakikada bir
setInterval(()=>{ if(loadStudentList().length>0) refreshAll(); },5*60*1000);
